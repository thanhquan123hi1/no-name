# model setting
pretrained: null
model_name: bias_real_anchor
backbone_name: vit

# Loss settings: CrossEntropy + progressive alpha_real * Real-anchor SupCon
weight_real: 1.0
weight_fake: 1.0
label_smoothing: 0.1
alpha_real_max: 0.05
alpha_real_start_epoch: 0
alpha_real_warmup_epochs: 5
temperature: 0.07
base_temperature: 0.07

# Direct normalized CLIP pooler feature
feature_dim: 1024
normalize_eps: 0.000001

# Bias-only backbone adaptation (no LoRA)
use_lora: false
train_backbone_bias: true
strict_trainable_check: true

# backbone setting
backbone_config:
  mode: original
  num_classes: 2
  inc: 3
  dropout: false

# dataset
all_dataset:
  [
    FaceForensics++,
    FF-F2F,
    FF-DF,
    FF-FS,
    FF-NT,
    FaceShifter,
    DeepFakeDetection,
    Celeb-DF-v1,
    Celeb-DF-v2,
    DFDCP,
    DFDC,
    DeeperForensics-1.0,
    UADFV,
  ]
train_dataset: [FaceForensics++]
test_dataset: [Celeb-DF-v2, FaceShifter, DeeperForensics-1.0]

compression: c23
train_batchSize: 128
test_batchSize: 256
workers: 8
frame_num:
  train: 8
  test: 32
resolution: 224
with_mask: false
with_landmark: false

# data augmentation
use_data_augmentation: true
data_aug:
  flip_prob: 0.5
  rotate_prob: 0.5
  rotate_limit: [-10, 10]
  blur_prob: 0.5
  blur_limit: [3, 7]
  brightness_prob: 0.5
  brightness_limit: [-0.1, 0.1]
  contrast_limit: [-0.1, 0.1]
  quality_lower: 40
  quality_upper: 100

# CLIP mean/std
mean: [0.48145466, 0.4578275, 0.40821073]
std: [0.26862954, 0.26130258, 0.27577711]

# optimizer config
optimizer:
  type: adam
  adam:
    lr: 0.0001
    beta1: 0.9
    beta2: 0.999
    eps: 0.00000001
    weight_decay: 0.0001
    amsgrad: false

# training config
lr_scheduler: cosine
scheduler_step_per_epoch: true
lr_T_max: 10
lr_eta_min: 0.000001
nEpochs: 10
start_epoch: 0
save_epoch: 1
rec_iter: 100
logdir: /kaggle/tmp/logs
manualSeed: 7749
save_ckpt: true
save_feat: true
save_avg: true

# loss function
loss_func: cross_entropy
losstype: ce_real_anchor_supcon_bias

# metric
metric_scoring: video_auc

# cuda
ngpu: 1
cuda: true
cudnn: true
