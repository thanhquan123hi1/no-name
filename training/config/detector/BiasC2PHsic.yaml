# model setting
pretrained: null
model_name: bias_c2p_hsic
backbone_name: vit
clip_model_name: openai/clip-vit-large-patch14

# Bias-only adaptation. No LoRA.
use_lora: false
train_backbone_bias: true
strict_trainable_check: true

# C2P-style cosine-to-concept classifier (no free linear head).
feature_dim: 1024
concept_dim: 768
content_dim: 256
normalize_eps: 0.000001
concept_temperature: 0.07
freeze_concept: true

# Frozen text concept anchors (averaged over prompts).
concept_real_prompts:
  - "a real face"
  - "an authentic photo of a face"
  - "a genuine human face"
concept_fake_prompts:
  - "a deepfake face"
  - "a manipulated face"
  - "a face forgery"
  - "a synthetic fake face"

# Cross-entropy settings.
weight_real: 1.0
weight_fake: 1.0
label_smoothing: 0.1

# HSIC decoupling (forgery vs content) with progressive warmup.
lambda_hsic_max: 1.0
lambda_hsic_start_epoch: 0
lambda_hsic_warmup_epochs: 3

# Content branch reconstruction (keeps content informative so HSIC is not trivial).
lambda_content: 0.1

# backbone setting
backbone_config:
  mode: original
  num_classes: 2
  inc: 3
  dropout: false

# dataset
all_dataset:
  [
    FaceForensics++,
    FF-F2F,
    FF-DF,
    FF-FS,
    FF-NT,
    FaceShifter,
    DeepFakeDetection,
    Celeb-DF-v1,
    Celeb-DF-v2,
    DFDCP,
    DFDC,
    DeeperForensics-1.0,
    UADFV,
  ]
train_dataset: [FaceForensics++]
test_dataset: [Celeb-DF-v2, FaceShifter, DeeperForensics-1.0]

compression: c23
# Single-view training (no consistency). A100 can hold 128.
train_batchSize: 128
test_batchSize: 256
workers: 8
frame_num:
  train: 8
  test: 32
resolution: 224
with_mask: false
with_landmark: false

# No consistency views in this detector.
use_consistency: false
use_consistency_views: false

# Strong-view augmentation applied as ordinary single-view augmentation.
use_data_augmentation: true
data_aug:
  flip_prob: 0.5
  rotate_prob: 0.5
  rotate_limit: [-10, 10]
  blur_prob: 0.5
  blur_limit: [3, 7]
  brightness_prob: 0.5
  brightness_limit: [-0.1, 0.1]
  contrast_limit: [-0.1, 0.1]
  quality_lower: 40
  quality_upper: 100

# Official CLIP image normalization.
mean: [0.48145466, 0.4578275, 0.40821073]
std: [0.26862954, 0.26130258, 0.27577711]

# optimizer config (lr scaled up slightly for the larger batch).
optimizer:
  type: adam
  adam:
    lr: 0.00015
    beta1: 0.9
    beta2: 0.999
    eps: 0.00000001
    weight_decay: 0.0001
    amsgrad: false

# training config
lr_scheduler: cosine
scheduler_step_per_epoch: true
lr_T_max: 10
lr_eta_min: 0.000001
nEpochs: 10
start_epoch: 0
save_epoch: 1
rec_iter: 100
logdir: /kaggle/tmp/logs
manualSeed: 7749
save_ckpt: true
save_feat: true
save_avg: true

# loss function
loss_func: cross_entropy
losstype: ce_concept_hsic_bias

# metric
metric_scoring: auc

# cuda
ngpu: 1
cuda: true
cudnn: true
